<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaga Confirmada — Barbearia 1907</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --dark:       #080808;
            --dark-3:     #181818;
            --gold:       #C4A052;
            --gold-light: #D4B572;
            --white:      #FFFFFF;
            --off-white:  #EDE8DF;
            --gray:       #666666;
            --gray-light: #AAAAAA;
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--dark);
            color: var(--white);
            font-family: Inter, system-ui, -apple-system, sans-serif;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 24px;
            position: relative;
            overflow: hidden;
        }

        /* glow de fundo */
        body::before {
            content: '';
            position: absolute;
            top: -200px; left: 50%;
            transform: translateX(-50%);
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(196,160,82,.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            position: relative;
            max-width: 520px;
            width: 100%;
            background: var(--dark-3);
            border: 1px solid rgba(196,160,82,.2);
            border-radius: 8px;
            padding: 56px 48px;
        }

        /* logo */
        .logo { margin-bottom: 40px; }
        .logo-barbearia {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 7px;
            text-transform: uppercase;
            color: var(--gray-light);
            display: block;
        }
        .logo-year {
            font-size: 52px;
            font-weight: 800;
            line-height: 1;
            color: var(--white);
            display: block;
        }
        .logo-tagline {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gray);
            display: block;
            margin-top: 4px;
        }

        /* divider */
        .divider {
            width: 40px; height: 2px;
            background: var(--gold);
            margin: 0 auto 32px;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            color: var(--white);
            line-height: 1.25;
            margin-bottom: 16px;
        }

        h1 span { color: #A07540; }

        .subtitle {
            font-size: 16px;
            color: var(--gray-light);
            font-weight: 400;
            margin-bottom: 36px;
            line-height: 1.7;
        }

        /* CTA button */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--gold);
            color: #000;
            font-family: Inter, system-ui, -apple-system, sans-serif;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 0;
            text-transform: none;
            padding: 14px 28px;
            border-radius: 3px;
            text-decoration: none;
            width: 100%;
            transition: background .2s, transform .1s;
        }
        .btn:hover  { background: var(--gold-light); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .btn-icon { font-size: 15px; }

        /* footer */
        footer {
            margin-top: 40px;
            font-size: 12px;
            color: var(--gray);
        }

        @media (max-width: 480px) {
            .card { padding: 40px 24px; }
            .event-bar { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="card">

        <div class="logo">
            <span class="logo-barbearia">Barbearia</span>
            <span class="logo-year">1907</span>
            <span class="logo-tagline">Mais que estilo. Identidade.</span>
        </div>

        <div class="divider"></div>

        <h1>Obrigado por preencher o formulário! <span>Sua inscrição está quase finalizada...</span></h1>

        <p class="subtitle">
            Clique no botão abaixo para entrar no grupo de participantes e fique atento aos avisos.
        </p>

        <a class="btn" href="https://chat.whatsapp.com/B8qBbHrjxHpJkbMoFDie2h" target="_blank">
            <span class="btn-icon">💬</span>
            Entrar no Grupo de Participantes
        </a>

    </div>

    <footer>Barbearia 1907 &nbsp;·&nbsp; Amparo, SP</footer>

</body>
</html>
